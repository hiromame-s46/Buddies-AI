<style>
:root{--bg:#f6f7fb;--panel:rgba(255,255,255,.88);--solid:#fff;--text:#171a20;--muted:#727986;--line:#e0e4eb;--soft:#eef1f6;--accent:#365fe5;--accent2:#2447b9;--assistant:#fff;--user:#365fe5;--danger:#c03434;--shadow:0 18px 60px rgba(28,35,51,.11);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}@media(prefers-color-scheme:dark){:root{--bg:#0c0f14;--panel:rgba(20,24,31,.88);--solid:#171b22;--text:#f2f4f7;--muted:#9ba3af;--line:#2a303a;--soft:#222833;--accent:#7898ff;--accent2:#5f7ee5;--assistant:#171b22;--user:#345bbd;--danger:#ff8585;--shadow:0 18px 60px rgba(0,0,0,.35)}}*{box-sizing:border-box}html,body{height:100%;overscroll-behavior:none}body{margin:0;background:var(--bg);color:var(--text);overflow:hidden}button,textarea,input,select{font:inherit}.app{height:100dvh;max-width:1000px;margin:auto;display:grid;grid-template-rows:auto 1fr auto;background:var(--bg)}header{display:flex;align-items:center;gap:12px;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;background:var(--panel);border-bottom:1px solid var(--line);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);z-index:5}.mark{width:40px;height:40px;border-radius:14px;background:linear-gradient(145deg,var(--accent),var(--accent2));color:#fff;display:grid;place-items:center;font-weight:900;box-shadow:0 8px 22px rgba(54,95,229,.27)}.brand{min-width:0;flex:1}.brand strong{display:block;font-size:16px}.status{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px;margin-top:2px}.dot{width:7px;height:7px;border-radius:50%;background:#89909b}.dot.ok{background:#25a875}.dot.busy{background:#e29a23;animation:pulse 1s infinite}.dot.bad{background:var(--danger)}@keyframes pulse{50%{opacity:.35}}.icon{width:40px;height:40px;border:1px solid var(--line);background:var(--solid);color:var(--text);border-radius:12px;display:grid;place-items:center;cursor:pointer}.icon svg{width:20px;height:20px}.messages{overflow-y:auto;padding:18px 14px 30px;scroll-behavior:smooth}.empty{min-height:100%;display:grid;place-items:center;text-align:center;padding:26px}.empty-inner{max-width:570px}.empty h1{font-size:clamp(27px,7vw,48px);letter-spacing:-.04em;margin:0 0 10px}.empty p{color:var(--muted);line-height:1.7;margin:0 auto 22px}.starters{display:grid;grid-template-columns:1fr 1fr;gap:9px}.starter{border:1px solid var(--line);background:var(--solid);color:var(--text);border-radius:15px;padding:13px;text-align:left;cursor:pointer;line-height:1.45}.message{display:flex;gap:10px;margin:0 auto 20px;max-width:780px;align-items:flex-start}.message.user{flex-direction:row-reverse}.avatar{flex:0 0 32px;width:32px;height:32px;border-radius:11px;background:var(--soft);display:grid;place-items:center;font-size:12px;font-weight:800}.message.user .avatar{background:var(--user);color:#fff}.bubble-wrap{min-width:0;max-width:min(78%,680px)}.bubble{padding:12px 14px;border:1px solid var(--line);background:var(--assistant);border-radius:5px 18px 18px 18px;white-space:pre-wrap;word-break:break-word;line-height:1.72;box-shadow:0 6px 24px rgba(30,40,60,.04)}.user .bubble{background:var(--user);color:#fff;border-color:transparent;border-radius:18px 5px 18px 18px}.meta{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:11px;margin:5px 4px 0}.user .meta{justify-content:flex-end}.copy{border:0;background:none;color:inherit;padding:0;cursor:pointer}.typing{display:flex;gap:5px;padding:5px}.typing i{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1.1s infinite}.typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.45}30%{transform:translateY(-5px);opacity:1}}footer{padding:9px 12px calc(9px + env(safe-area-inset-bottom));background:var(--panel);border-top:1px solid var(--line);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}.composer-row{max-width:790px;margin:auto;display:flex;align-items:flex-end;gap:8px}.composer{flex:1;display:flex;align-items:flex-end;gap:7px;border:1px solid var(--line);background:var(--solid);border-radius:18px;padding:7px 7px 7px 13px;box-shadow:var(--shadow)}textarea{flex:1;resize:none;max-height:150px;min-height:29px;border:0;outline:0;background:transparent;color:var(--text);line-height:1.5;padding:4px 0}.send{flex:0 0 40px;width:40px;height:40px;border:0;border-radius:13px;background:var(--accent);color:#fff;display:grid;place-items:center;cursor:pointer}.send:disabled{opacity:.35;cursor:not-allowed}.send svg{width:19px;height:19px}.stop{display:none;flex:0 0 auto;border:1px solid var(--line);background:var(--solid);color:var(--text);border-radius:14px;padding:12px;cursor:pointer}.stop.show{display:block}.hint{text-align:center;color:var(--muted);font-size:10px;margin-top:6px}.backdrop{position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.42);display:none;align-items:flex-end;justify-content:center;padding:15px}.backdrop.open{display:flex}.modal{width:min(580px,100%);max-height:min(740px,92dvh);overflow:auto;background:var(--solid);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow)}.modal-head{display:flex;align-items:center;justify-content:space-between}.modal h2{font-size:19px;margin:0}.close{border:0;background:var(--soft);color:var(--text);width:34px;height:34px;border-radius:10px;font-size:22px}.field{display:grid;gap:6px;margin-top:14px}.field label{font-size:13px;font-weight:700}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:11px;background:var(--bg);color:var(--text);padding:10px}.field textarea{min-height:92px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.check{display:flex;gap:8px;align-items:center;margin-top:14px;font-size:13px}.actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}.btn{border:0;border-radius:11px;padding:10px 13px;font-weight:700;cursor:pointer}.primary{background:var(--accent);color:#fff}.secondary{background:var(--soft);color:var(--text)}.danger{background:color-mix(in srgb,var(--danger) 13%,transparent);color:var(--danger)}.toast{position:fixed;z-index:30;left:50%;bottom:calc(88px + env(safe-area-inset-bottom));transform:translate(-50%,15px);opacity:0;background:#111827;color:#fff;padding:9px 14px;border-radius:999px;font-size:13px;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:620px){.messages{padding-inline:10px}.bubble-wrap{max-width:86%}.starters{grid-template-columns:1fr}.hint{display:none}.backdrop{padding:0;align-items:flex-end}.modal{border-radius:22px 22px 0 0;padding-bottom:calc(18px + env(safe-area-inset-bottom))}.two{grid-template-columns:1fr}.actions{display:grid;grid-template-columns:1fr 1fr}.actions .primary{grid-column:1/-1;grid-row:1}.empty{align-items:start;padding-top:12vh}}@media(min-width:1001px){.app{border-inline:1px solid var(--line)}}
.mark{width:140px;flex:0 0 140px;background:#fff;border:1px solid var(--line);overflow:hidden}.mark img{width:100%;height:100%;object-fit:contain;object-position:center}header{position:relative;justify-content:flex-end}.mark{position:absolute;left:50%;transform:translateX(-50%);width:150px;flex-basis:150px;background:#fff;border-color:#f2b2c7;box-shadow:0 6px 18px rgba(236,132,166,.16)}.brand{position:absolute;left:14px;top:50%;transform:translateY(-50%)}.brand strong{display:none}.status{margin-top:0}.icon{border-color:#f2b2c7}.send,.primary{background:#df7d9e}.user .bubble{background:#df7d9e}.starter:hover,.icon:hover{border-color:#df7d9e}@media(max-width:620px){.mark{width:128px;flex-basis:128px}.brand{left:10px}}:root{--bg:#fbfafb;--panel:#fff;--solid:#fff;--text:#242229;--muted:#77717a;--line:#eee3e8;--soft:#faf2f5;--accent:#d8799b;--accent2:#b85d82;--assistant:#fff;--user:#d8799b;--shadow:none}header,footer{background:var(--solid);backdrop-filter:none;-webkit-backdrop-filter:none}.mark{box-shadow:none;border-radius:10px}.composer,.bubble,.modal{box-shadow:none}.starter{background:var(--solid);border-color:var(--line)}.starter:hover,.icon:hover{background:var(--soft)}.hint{color:#958b92}</style>
</head>
<body><div class="app">
<header><div class="mark"><img src="buddies-ai-logo.png" alt="Buddies AI"></div><div class="brand"><div class="status"><span id="statusDot" class="dot"></span><span id="statusText">接続確認中</span></div></div><button id="clearButton" class="icon" aria-label="会話を削除" title="会話を削除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2m-7 4v7m6-7v7M6 6l1 15h10l1-15"/></svg></button><button id="settingsButton" class="icon" aria-label="設定"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.83 2.83-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21h-4v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06-2.83-2.83.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3v-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.88l-.06-.06 2.83-2.83.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3h4v.09A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.88-.34l.06-.06 2.83 2.83-.06.06A1.7 1.7 0 0 0 19.4 9c.18.37.5.7.9.9.34.18.72.28 1.1.28H21v4h-.09a1.7 1.7 0 0 0-1.51.82Z"/></svg></button></header>
<main id="messages" class="messages"><section id="empty" class="empty"><div class="empty-inner"><h1>Buddies AI</h1><p>Liquid AIの軽量日本語モデルを、このサーバー上で実行します。回答には誤りが含まれる場合があります。</p><div class="starters"><button class="starter" data-text="今日やるべきことを3つに整理してください。">今日の予定を整理する</button><button class="starter" data-text="次の文章を自然で簡潔な日本語に直してください。\n\n">文章を推敲する</button><button class="starter" data-text="高校生にも分かるように、人工知能の仕組みを説明してください。">分かりやすく解説</button><button class="starter" data-text="アイデアを5つ提案してください。テーマ：">アイデアを出す</button></div></div></section></main>
<footer><div class="composer-row"><button id="stopButton" class="stop" type="button">停止</button><button id="imageButton" class="icon" type="button" aria-label="画像からメンバーを判定" title="画像からメンバーを判定"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="3"/><circle cx="8.5" cy="9" r="1.5"/><path d="m4 17 4.5-4.5 3.5 3 2.5-2.5L20 17"/></svg></button><input id="imageInput" type="file" accept="image/*" hidden><form id="composer" class="composer"><textarea id="input" rows="1" maxlength="3000" placeholder="メッセージを入力" aria-label="メッセージ"></textarea><button id="sendButton" class="send" type="submit" disabled aria-label="送信"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 12 14-7-4 14-3-6-7-1Z"/><path d="m12 13 7-8"/></svg></button></form></div><div class="hint">Enterで送信・Shift＋Enterで改行　｜　画像からメンバーを判定</div></footer>
</div>
<div id="settingsBackdrop" class="backdrop" role="dialog" aria-modal="true"><div class="modal"><div class="modal-head"><h2>チャット設定</h2><button id="closeSettings" class="close" type="button">×</button></div><div class="field"><label for="apiUrl">API URL</label><input id="apiUrl" value="lfm-api.php" autocomplete="off"></div><div class="field"><label for="systemPrompt">AIへの指示</label><textarea id="systemPrompt">あなたは日本語で簡潔かつ正確に回答するアシスタントです。分からない内容は推測で断定しないでください。</textarea></div><div class="two"><div class="field"><label for="maxTokens">最大出力</label><select id="maxTokens"><option value="64">64 tokens</option><option value="128">128 tokens</option><option value="192" selected>192 tokens</option><option value="256">256 tokens</option></select></div><div class="field"><label for="temperature">創造性</label><select id="temperature"><option value="0.1">低い</option><option value="0.2" selected>標準</option><option value="0.5">高め</option><option value="0.8">高い</option></select></div></div><label class="check"><input id="includeHistory" type="checkbox" checked>直近の会話を含める</label><label class="check"><input id="saveHistory" type="checkbox" checked>この端末に履歴を保存</label><div class="actions"><button id="resetSettings" class="btn danger" type="button">初期化</button><button id="cancelSettings" class="btn secondary" type="button">キャンセル</button><button id="saveSettings" class="btn primary" type="button">保存</button></div></div></div>
<div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script><script src="../ASTRA/matcher.js"></script><script>
'use strict';
const $=id=>document.getElementById(id);const STORE={settings:'lfm-chat-400-settings',history:'lfm-chat-400-history'};const defaults={apiUrl:'lfm-api.php',systemPrompt:'あなたは日本語で簡潔かつ正確に回答するアシスタントです。分からない内容は推測で断定しないでください。',maxTokens:192,temperature:.2,includeHistory:true,saveHistory:true};let settings={...defaults},messages=[],controller=null,generating=false;
function parse(v,f){try{return JSON.parse(v)}catch{return f}}function load(){settings={...defaults,...parse(localStorage.getItem(STORE.settings),{})};if(settings.saveHistory)messages=parse(localStorage.getItem(STORE.history),[]).filter(x=>x&&['user','assistant'].includes(x.role)&&typeof x.text==='string').slice(-24)}function persist(){localStorage.setItem(STORE.settings,JSON.stringify(settings));if(settings.saveHistory)localStorage.setItem(STORE.history,JSON.stringify(messages.slice(-24)));else localStorage.removeItem(STORE.history)}function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>e.classList.remove('show'),1800)}function status(type,text){$('statusDot').className='dot '+(type||'');$('statusText').textContent=text}function time(ts){return new Intl.DateTimeFormat('ja-JP',{hour:'2-digit',minute:'2-digit'}).format(new Date(ts))}
function append(m,runtime=false){const row=document.createElement('article');row.className=`message ${m.role}`;const av=document.createElement('div');av.className='avatar';av.textContent=m.role==='user'?'YOU':'LFM';const wrap=document.createElement('div');wrap.className='bubble-wrap';const bubble=document.createElement('div');bubble.className='bubble';bubble.textContent=m.text;const meta=document.createElement('div');meta.className='meta';meta.innerHTML=`<span>${time(m.time||Date.now())}</span>`;if(!runtime){const copy=document.createElement('button');copy.className='copy';copy.type='button';copy.textContent='コピー';copy.onclick=async()=>{try{await navigator.clipboard.writeText(m.text);toast('コピーしました')}catch{toast('コピーできませんでした')}};meta.append(copy)}wrap.append(bubble,meta);row.append(av,wrap);$('messages').append(row);return{row,bubble}}
function render(){$('messages').querySelectorAll('.message').forEach(x=>x.remove());$('empty').hidden=messages.length>0;messages.forEach(m=>append(m));scroll(false)}function scroll(smooth=true){requestAnimationFrame(()=>$('messages').scrollTo({top:$('messages').scrollHeight,behavior:smooth?'smooth':'auto'}))}function add(role,text){const m={role,text:String(text).trim(),time:Date.now()};messages.push(m);messages=messages.slice(-24);persist();$('empty').hidden=true;append(m);scroll();return m}function resize(){const e=$('input');e.style.height='auto';e.style.height=Math.min(150,e.scrollHeight)+'px';$('sendButton').disabled=generating||!e.value.trim()}
function payload(current){const list=[];if(settings.includeHistory){for(const m of messages.slice(-9,-1))list.push({role:m.role,content:m.text})}list.push({role:'user',content:current});return{messages:list,max_tokens:Number(settings.maxTokens)||192,temperature:Number(settings.temperature)||.2}}
function errorMessage(code,d){const e=String(d?.error||d?.message||'');if(code===429&&e.includes('busy'))return '現在ほかの回答を生成中です。少し後でもう一度送信してください。';if(code===429){const s=Number(d?.retry_after)||0;return `利用回数の上限に達しました。${s?Math.ceil(s/60)+'分ほど後に':'時間を空けて'}再度お試しください。`}if(code===503)return 'モデルまたはllama.cppの準備ができていません。';if(code===504)return '生成がタイムアウトしました。質問や最大出力を短くしてください。';if(e.includes('libssl.so.3'))return 'llama.cppの共有ライブラリが不足しています。管理画面の依存関係診断を確認してください。';if(e.includes('empty generation'))return `推論結果が空でした。${d?.details?' '+String(d.details).slice(0,180):''}`;return e?`APIエラー: ${e}`:`通信エラー（HTTP ${code}）`}
async function send(text){if(generating||!text.trim())return;text=text.trim();add('user',text);$('input').value='';resize();generating=true;controller=new AbortController();$('stopButton').classList.add('show');status('busy','生成中…');const loading=append({role:'assistant',text:'',time:Date.now()},true);loading.bubble.innerHTML='<span class="typing"><i></i><i></i><i></i></span>';scroll();try{const r=await fetch(settings.apiUrl||'lfm-api.php',{method:'POST',cache:'no-store',signal:controller.signal,headers:{'Content-Type':'application/json'},body:JSON.stringify(payload(text))});const raw=await r.text();let d;try{d=JSON.parse(raw)}catch{throw new Error(`JSONではない応答: ${raw.slice(0,180)}`)}if(!r.ok||!d.ok)throw new Error(errorMessage(r.status,d));loading.row.remove();add('assistant',d.text);status('ok',`${d.elapsed_seconds??'-'}秒で回答`)}catch(e){loading.row.remove();if(e.name==='AbortError'){status('','中止しました');toast('生成を中止しました')}else{add('assistant','⚠ '+e.message);status('bad','エラー')}}finally{generating=false;controller=null;$('stopButton').classList.remove('show');resize();$('input').focus()}}
async function health(){try{const r=await fetch((settings.apiUrl||'lfm-api.php')+'?action=health&v='+Date.now(),{cache:'no-store'});const d=await r.json();if(d.ok&&d.status?.ready)status('ok','モデル準備完了');else status('bad','セットアップ未完了')}catch{status('bad','APIに接続できません')}}function fill(){$('apiUrl').value=settings.apiUrl;$('systemPrompt').value=settings.systemPrompt;$('maxTokens').value=String(settings.maxTokens);$('temperature').value=String(settings.temperature);$('includeHistory').checked=!!settings.includeHistory;$('saveHistory').checked=!!settings.saveHistory}function open(){fill();$('settingsBackdrop').classList.add('open')}function close(){$('settingsBackdrop').classList.remove('open')}
$('composer').onsubmit=e=>{e.preventDefault();send($('input').value)};$('input').oninput=resize;$('input').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing&&!matchMedia('(max-width:620px)').matches){e.preventDefault();$('composer').requestSubmit()}};$('stopButton').onclick=()=>controller?.abort();$('settingsButton').onclick=open;$('closeSettings').onclick=close;$('cancelSettings').onclick=close;$('settingsBackdrop').onclick=e=>{if(e.target===$('settingsBackdrop'))close()};$('saveSettings').onclick=()=>{settings={apiUrl:$('apiUrl').value.trim()||'lfm-api.php',systemPrompt:$('systemPrompt').value.trim(),maxTokens:Number($('maxTokens').value)||192,temperature:Number($('temperature').value)||.2,includeHistory:$('includeHistory').checked,saveHistory:$('saveHistory').checked};persist();close();toast('設定を保存しました');health()};$('resetSettings').onclick=()=>{settings={...defaults};fill();persist();toast('設定を初期化しました')};$('clearButton').onclick=()=>{if(!messages.length||confirm('この端末の会話履歴を削除しますか？')){messages=[];persist();render();toast('会話を削除しました')}};document.querySelectorAll('.starter').forEach(b=>b.onclick=()=>{$('input').value=b.dataset.text||'';resize();$('input').focus()});load();render();resize();health();$('input').focus();
// 基本情報は既存設定画面へ動的に追加し、旧設定との互換性も保つ。
(()=>{const p=$('systemPrompt');if(!p||$('basicInfo'))return;const f=document.createElement('div');f.className='field';f.innerHTML='<label for="basicInfo">基本情報（辞書）</label><textarea id="basicInfo" placeholder="名前=山田太郎\n好みの文体=簡潔でやさしい日本語\n拠点=東京"></textarea><small class="hint">1行に1項目、形式は「キー=値」。会話ごとにAIへ渡します。</small>';p.parentElement.after(f);const save=$('saveSettings').onclick;$('saveSettings').onclick=()=>{save();settings.basicInfo=$('basicInfo').value.trim();persist()};const oldFill=window.fill;window.fill=()=>{oldFill();$('basicInfo').value=settings.basicInfo||''};})();

const astra={ready:null,index:null};
async function astraLoad(){
  if(astra.ready)return astra.ready;
  astra.ready=(async()=>{status('busy','ASTRAモデルを読み込み中…');
    const modelUrl='https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
    await Promise.all([faceapi.nets.ssdMobilenetv1.loadFromUri(modelUrl),faceapi.nets.faceLandmark68Net.loadFromUri(modelUrl),faceapi.nets.faceRecognitionNet.loadFromUri(modelUrl)]);
    const r=await fetch('../ASTRA/api.php?action=descriptors&model=playground',{cache:'no-store'}); const data=await r.json();
    astra.index=AstraFaceIndex.build(data,{maxPrototypes:32,refineTopMembers:12,topK:5});
    if(!astra.index.ready)throw new Error('ASTRAのメンバー学習データがありません');
  })().catch(e=>{astra.ready=null;throw e});
  return astra.ready;
}
async function identifyImage(file){
  const url=URL.createObjectURL(file); try{await astraLoad(); const img=new Image(); img.src=url; await new Promise((resolve,reject)=>{img.onload=resolve;img.onerror=reject});
    const detections=await faceapi.detectAllFaces(img,new faceapi.SsdMobilenetv1Options({minConfidence:.45})).withFaceLandmarks().withFaceDescriptors();
    if(!detections.length)return '画像を確認しましたが、顔を検出できませんでした。';
    const rows=detections.map((det,i)=>{const c=AstraFaceIndex.candidates(astra.index,det.descriptor,{refineTopMembers:12,topK:5});const best=c[0];const second=c[1];const margin=second?second.distance-best.distance:Infinity;const known=best&&best.distance<=.58&&margin>=.015;return `顔${i+1}: ${known?best.name+'（候補）':'判定保留'}${best?`\n  最有力: ${best.name} / 距離 ${best.distance.toFixed(3)}`:''}`});
    return `【スキル読み込み: ASTRA】\n\nASTRAで画像を判定しました（${detections.length}人）。\n\n${rows.join('\n\n')}\n\n※判定結果は参考情報です。`;
  }finally{URL.revokeObjectURL(url);status('ok','モデル準備完了')}
}
