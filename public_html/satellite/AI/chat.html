<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="robots" content="noindex,nofollow">
  <meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
  <title>Buddies AI</title>
  <link rel="stylesheet" href="chat.css?v=10">
</head>
<body>
<div class="app">
  <header class="app-header">
    <strong class="brand-name">Buddies AI</strong>
    <div class="header-actions">
      <button id="clearButton" class="icon-button" type="button" aria-label="会話を削除" title="会話を削除">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 6h18M8 6V4h8v2m-7 4v7m6-7v7M6 6l1 15h10l1-15"/></svg>
      </button>
      <button id="settingsButton" class="icon-button" type="button" aria-label="設定" title="設定">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l-2.83 2.83A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1.4 1.51V21h-4v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-2.83-2.83A1.7 1.7 0 0 0 4.6 15 1.7 1.7 0 0 0 3.09 13.6H3v-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.88l2.83-2.83A1.7 1.7 0 0 0 9 4.6 1.7 1.7 0 0 0 10.4 3.09V3h4v.09A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.88-.34l2.83 2.83A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.51 1.4H21v4h-.09A1.7 1.7 0 0 0 19.4 15Z"/></svg>
      </button>
    </div>
  </header>

  <main id="messages" class="messages" aria-live="polite">
    <section id="empty" class="empty">
      <div class="empty-inner">
        <h1>Buddies AI</h1>
        <p>回答には誤りが含まれる場合があります。</p>
        <div class="starters">
          <button class="starter" data-text="今日の櫻坂46の予定を教えてください。">今日の櫻坂46の予定</button>
          <button class="starter" data-text="櫻坂46の最新ニュースを教えてください。">櫻坂46の最新ニュース</button>
          <button class="starter" data-text="櫻坂46のおすすめ楽曲を3曲紹介してください。">おすすめ楽曲を紹介</button>
          <button class="starter" data-text="櫻坂46メンバーのプロフィールを教えてください。メンバー名：">メンバーを調べる</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="composer-footer">
    <div class="composer-row">
      <button id="imageButton" class="image-button" type="button" aria-label="画像からメンバーを判定" title="画像からメンバーを判定">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="3"/><circle cx="8.5" cy="9" r="1.5"/><path d="m4 17 4.5-4.5 3.5 3 2.5-2.5L20 17"/></svg>
      </button>
      <input id="imageInput" type="file" accept="image/*" hidden>
      <form id="composer" class="composer">
        <textarea id="input" rows="1" maxlength="20000" placeholder="メッセージを入力" aria-label="メッセージ"></textarea>
        <button id="sendButton" class="send-button" type="submit" disabled aria-label="送信"></button>
      </form>
    </div>
    <div class="hint">Enterで送信・Shift＋Enterで改行</div>
  </footer>
</div>

<div id="settingsBackdrop" class="backdrop" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
  <div class="modal">
    <div class="modal-head"><h2 id="settingsTitle">チャット設定</h2><button id="closeSettings" class="close-button" type="button" aria-label="閉じる"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 6 12 12M18 6 6 18"/></svg></button></div>
    <label class="check"><input id="includeHistory" type="checkbox" checked>直近の会話を要約して含める</label>
    <label class="check"><input id="saveHistory" type="checkbox" checked>この端末に履歴を保存</label>
    <div class="actions"><button id="resetSettings" class="button danger" type="button">初期化</button><button id="saveSettings" class="button primary" type="button">保存</button></div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script src="chat.js?v=10" defer></script>
</body>
</html>
